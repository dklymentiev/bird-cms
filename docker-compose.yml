# Bird CMS -- minimal docker-compose for local evaluation.
#
# Quick start:
#   1. docker compose up -d
#   2. Open http://localhost:8080 -- the install wizard walks you through
#      site name, admin user, password, and seeds demo content.
#   3. After install, admin lives at http://localhost:8080/admin.
#
# No manual .env, no APP_KEY hex, no password hashing -- the wizard does
# all of that atomically on first request. Re-runnable until
# storage/installed.lock is written.
#
# For production with Traefik / Let's Encrypt / multi-site, see
# templates/docker/docker-compose.yml.template and docs/install.md.

services:
  bird-cms:
    build:
      context: .
      dockerfile: templates/docker/unified/Dockerfile
    container_name: bird-cms
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:rw
      - ./storage/logs/nginx:/var/log/nginx
    # .env is generated by the install wizard on first run, so it doesn't
    # exist on a fresh clone. Marking the file optional lets the container
    # boot anyway; the wizard then writes .env and the next restart picks
    # it up. Once installed, .env is required-by-convention but still
    # tolerant to absence (defense in depth).
    env_file:
      - path: .env
        required: false
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
