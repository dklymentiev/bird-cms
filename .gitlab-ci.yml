# GitLab CI for Bird CMS.
# Three stages on every push and MR:
#   - lint:  PHP syntax check across app/, public/, scripts/
#   - smoke: bash tests/smoke-test.sh against a php -S boot of the engine
#           PLUS the PHPUnit suite (unit + integration + mcp + parity)

stages:
  - lint
  - smoke

default:
  image: php:8.1-cli
  before_script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends curl ca-certificates git unzip
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

lint:
  stage: lint
  script:
    - find app public scripts -name '*.php' -print0
        | xargs -0 -n1 -P4 php -l
        | (grep -v 'No syntax errors' || true)
        | tee lint.out
    - if grep -q 'Parse error\|syntax error' lint.out; then
        echo "PHP syntax errors detected"; exit 1;
      fi
    - echo "OK -- no syntax errors"

smoke:
  stage: smoke
  needs: ["lint"]
  variables:
    APP_KEY: "ci-test-key-not-for-production-only-for-smoke-test-zzzz"
    ADMIN_USERNAME: "admin"
    ADMIN_PASSWORD_HASH: '$2y$10$Qf0.RoY95G9mgiHlD9vIQ.KRvGie2UfEiJlawVFJFISRcgQqpnby2'
    ADMIN_ALLOWED_IPS: "127.0.0.1"
    TRUSTED_PROXIES: "127.0.0.1"
    DEBUG: "false"
    ANALYTICS_RETENTION_VISITS: "10000"
    ACTIVE_THEME: "tailwind"
    SITE_NAME: "CI Test"
    SITE_URL: "http://localhost:8080"
  script:
    - cp .env.example .env || true
    - mkdir -p storage/cache storage/logs storage/analytics content/articles content/pages
    - cp templates/config-app.php config/app.php 2>/dev/null || true
    - composer install --no-interaction --prefer-dist --no-progress
    - make test
    - php -S 127.0.0.1:8080 -t public > /tmp/php.log 2>&1 &
    - sleep 2
    - bash tests/smoke-test.sh http://127.0.0.1:8080 || (cat /tmp/php.log; exit 1)
